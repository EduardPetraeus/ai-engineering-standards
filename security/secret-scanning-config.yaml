# Pre-commit configuration for secret scanning
# Copy to your project root as .pre-commit-config.yaml (or merge into existing)
#
# Install: pip install pre-commit && pre-commit install
# Run manually: pre-commit run --all-files

repos:
  # Detect secrets in code
  - repo: https://github.com/Yelp/detect-secrets
    rev: v1.4.0
    hooks:
      - id: detect-secrets
        args:
          - --baseline
          - .secrets.baseline
        exclude: |
          (?x)^(
            \.secrets\.baseline|
            .*\.lock|
            .*\.min\.js|
            package-lock\.json
          )$

  # Additional secret patterns via gitleaks
  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.18.0
    hooks:
      - id: gitleaks

  # General pre-commit hooks
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.5.0
    hooks:
      - id: detect-private-key
      - id: check-added-large-files
        args: [--maxkb=500]
      - id: check-merge-conflict
      - id: check-yaml
      - id: end-of-file-fixer
      - id: trailing-whitespace
      - id: no-commit-to-branch
        args: [--branch, main, --branch, master]

# ============================================================
# Custom regex patterns for secret detection
# ============================================================
# These patterns are used by detect-secrets and can be added to
# a .secrets.baseline file or custom plugin.
#
# To generate a baseline:
#   detect-secrets scan > .secrets.baseline
#
# To audit the baseline:
#   detect-secrets audit .secrets.baseline
# ============================================================

# Pattern reference (for custom scanning scripts or CI):
#
# AWS Access Key ID:
#   AKIA[0-9A-Z]{16}
#
# AWS Secret Access Key:
#   (?i)aws_secret_access_key\s*[=:]\s*["']?[A-Za-z0-9/+=]{40}["']?
#
# Generic API Key/Secret Assignment:
#   (?i)(api[_-]?key|api[_-]?secret|access[_-]?token|secret[_-]?key)\s*[=:]\s*["'][^"']{8,}["']
#
# GitHub Personal Access Token:
#   ghp_[A-Za-z0-9_]{36}
#
# GitHub OAuth Access Token:
#   gho_[A-Za-z0-9_]{36}
#
# GitHub App Token:
#   (ghu|ghs)_[A-Za-z0-9_]{36}
#
# Slack Bot Token:
#   xoxb-[0-9]{10,13}-[0-9]{10,13}-[a-zA-Z0-9]{24}
#
# Slack Webhook URL:
#   https://hooks\.slack\.com/services/T[A-Z0-9]{8,}/B[A-Z0-9]{8,}/[a-zA-Z0-9]{24}
#
# JWT Token (encoded):
#   eyJ[A-Za-z0-9_-]{10,}\.[A-Za-z0-9_-]{10,}\.[A-Za-z0-9_-]{10,}
#
# Private Key Block:
#   -----BEGIN\s+(RSA|DSA|EC|OPENSSH|PGP)\s+PRIVATE\s+KEY-----
#
# Database Connection String:
#   (?i)(postgresql|mysql|mongodb|redis|mssql):\/\/[^:]+:[^@]+@[^\s]+
#
# Generic Password Assignment:
#   (?i)(password|passwd|pwd)\s*[=:]\s*["'][^"']{6,}["']
#
# Stripe API Key:
#   (sk|pk)_(live|test)_[a-zA-Z0-9]{24,}
#
# SendGrid API Key:
#   SG\.[a-zA-Z0-9_-]{22}\.[a-zA-Z0-9_-]{43}
#
# Azure Storage Account Key:
#   (?i)AccountKey=[A-Za-z0-9+/=]{86,88}
#
# Google API Key:
#   AIza[0-9A-Za-z_-]{35}
#
# Twilio API Key:
#   SK[a-f0-9]{32}

# ============================================================
# .gitignore entries (add to your .gitignore)
# ============================================================
# .env
# .env.*
# *.pem
# *.key
# *credentials*.json
# *secret*
# !.secrets.baseline
